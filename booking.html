<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment | Luxe Touch Salon & Spa</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/jpeg" href="image/image1.jpg">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

.booking-section{
    min-height:100vh;
    padding:120px 20px 60px;
    background:#0d0d0d;
    display:flex;
    justify-content:center;
    align-items:center;
}

.booking-container{
    width:100%;
    max-width:700px;
    background:#161616;
    padding:40px;
    border-radius:20px;
    border:1px solid rgba(212,175,55,.3);
}

.booking-container h1{
    text-align:center;
    color:#d4af37;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#fff;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#222;
    color:#fff;
    font-size:16px;
}

.form-group textarea{
    resize:none;
    height:100px;
}

.book-btn{
    width:100%;
    padding:15px;
    background:#d4af37;
    border:none;
    border-radius:10px;
    color:#000;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
}

.book-btn:hover{
    background:#f1c94a;
}

.back-home{
    display:block;
    text-align:center;
    margin-top:20px;
    color:#d4af37;
    text-decoration:none;
}

</style>

</head>
<body>

<section class="booking-section">

<div class="booking-container">

<h1>Book Appointment</h1>

<form
id="bookingForm"
action="https://formspree.io/f/mojoanwb"
method="POST">

<div class="form-group">
<label>Full Name</label>
<input
type="text"
id="name"
name="Full Name"
required>
</div>

<div class="form-group">
<label>Email Address</label>
<input
type="email"
id="email"
name="Email Address"
required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input
type="tel"
id="phone"
name="Phone Number"
required>
</div>

<div class="form-group">
<label>Gender</label>
<select
id="gender"
name="Gender"
required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="form-group">
<label>Select Service</label>

<select
id="service"
name="Service"
required>

<option value="">Choose Service</option>

<optgroup label="Men Services">
<option value="Men Haircut">Men Haircut ($30)</option>
<option value="Beard Trim">Beard Trim ($45)</option>
<option value="VIP Grooming">VIP Grooming ($60)</option>
<option value="Hair Coloring">Hair Coloring ($70)</option>
</optgroup>

<optgroup label="Women Services">
<option value="Hair Styling">Hair Styling ($50)</option>
<option value="Braiding">Braiding ($70)</option>
<option value="Hair Coloring">Hair Coloring ($80)</option>
<option value="Facial Treatment">Facial Treatment ($90)</option>
</optgroup>

<optgroup label="Massage Services">
<option value="30 Minutes Massage">30 Minutes Massage ($50)</option>
<option value="60 Minutes Massage">60 Minutes Massage ($65)</option>
<option value="90 Minutes Massage">90 Minutes Massage ($85)</option>
<option value="Deep Tissue Massage">Deep Tissue Massage ($150)</option>
<option value="Relaxation Massage">Relaxation Massage ($100)</option>
<option value="Swedish Massage">Sessions 2x's a week ($250)</option>
</optgroup>

</select>
</div>

<div class="form-group">
<label>Appointment Date</label>
<input
type="date"
id="date"
name="Appointment Date"
required>
</div>

<div class="form-group">
<label>Appointment Time</label>
<input
type="time"
id="time"
name="Appointment Time"
required>
</div>

<div class="form-group">
<label>Additional Notes</label>
<textarea
id="notes"
name="Additional Notes"></textarea>
</div>

<button type="submit" class="book-btn">
Book Now
</button>

</form>

<a href="index.html" class="back-home">
← Back to Home
</a>

</div>

</section>

<script>

// Auto-select service from services.html

const params = new URLSearchParams(window.location.search);
const selectedService = params.get("service");

window.addEventListener("load", () => {

    if(selectedService){

        const serviceSelect =
        document.getElementById("service");

        for(let option of serviceSelect.options){

            if(
                option.value === selectedService ||
                option.text === selectedService
            ){
                serviceSelect.value = option.value;
                break;
            }

        }

    }

});

// Form Submission

const bookingForm =
document.getElementById("bookingForm");

bookingForm.addEventListener("submit", async (e) => {

    e.preventDefault();

    const bookingData = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        gender: document.getElementById("gender").value,
        service: document.getElementById("service").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        notes: document.getElementById("notes").value
    };

    localStorage.setItem(
        "bookingData",
        JSON.stringify(bookingData)
    );

    try {

        const response = await fetch(
            "https://formspree.io/f/mojoanwb",
            {
                method: "POST",
                body: new FormData(bookingForm),
                headers: {
                    "Accept": "application/json"
                }
            }
        );

        if(response.ok){

            alert(
                "Booking submitted successfully!"
            );

            window.location.href =
            "payment.html";

        }else{

            alert(
                "Failed to submit booking. Please try again."
            );

        }

    }catch(error){

        alert(
            "Network error. Please check your internet connection."
        );

    }

});

</script>

</body>
</html>
